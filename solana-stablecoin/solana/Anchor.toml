[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
solana = "4ourUpEhfq64WVb1gRwR7fxkWbKZnMPmbx6D6dFwvGCq"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"
anchor_version = "0.30.1"


[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
run-fixture = "npx ts-node -P ./tsconfig.json scripts/fixture-engine.ts"
